name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 获取版本号
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # workflow_dispatch: 递增版本号
            CURRENT_VERSION=$(grep -o '"version": *"[^"]*"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
            echo "Current version: $CURRENT_VERSION"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            # Tag push: 使用 tag 作为版本号
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION=${TAG_NAME#v}
            echo "Building tagged release: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            # Push main: 使用当前版本号，不递增
            VERSION=$(grep -o '"version": *"[^"]*"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
            echo "Building from main: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=${{ steps.get_version.outputs.version }}
          sed -i.bak "s/\"version\": *\"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          git add src-tauri/tauri.conf.json
          git commit -m "chore: bump version to $NEW_VERSION" || true
          git tag v$NEW_VERSION
          git push origin HEAD --tags

  # 构建任务
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.sha || needs.version.outputs.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'XiaoZhiSecretary v${{ needs.version.outputs.version }}'
          releaseBody: |
            ## XiaoZhiSecretary v${{ needs.version.outputs.version }}

            ### Downloads
            - **macOS**: Download `.dmg` file (ARM64 for Apple Silicon, x64 for Intel)
            - **Windows**: Download `.exe` or `.msi` installer
            - **Linux**: Download `.deb` or `.AppImage` file

            ### Installation
            - macOS: Open `.dmg` and drag to Applications
            - Windows: Run `.exe` installer
            - Linux: `sudo dpkg -i *.deb` or make `.AppImage` executable
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        with:
          name: build-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # Android APK 构建
  build-android:
    needs: version
    runs-on: ubuntu-latest
    name: Build (Android APK)

    env:
      ANDROID_API_LEVEL: 34
      NDK_VERSION: 27.0.12077973
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.sha || needs.version.outputs.tag }}

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          cd $ANDROID_HOME/cmdline-tools/latest
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -qo cmdline-tools.zip
          rm cmdline-tools.zip
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;34.0.0" \
            "ndk;${{ env.NDK_VERSION }}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: mobile/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        working-directory: mobile
        run: npm install

      - name: Init Tauri Android project
        working-directory: mobile
        run: npx tauri android init

      - name: Build Android APK (release)
        working-directory: mobile
        run: npx tauri android build

      - name: Find APK files
        id: find-apk
        run: |
          echo "=== Searching for APK files ==="
          # 列出所有可能的 APK 位置
          for dir in \
            "mobile/src-tauri/target/aarch64-linux-android/release/bundle/apk/" \
            "mobile/src-tauri/target/armv7-linux-androideabi/release/bundle/apk/" \
            "mobile/src-tauri/target/x86_64-linux-android/release/bundle/apk/" \
            "mobile/src-tauri/target/i686-linux-android/release/bundle/apk/" \
            "mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/" \
            "mobile/src-tauri/gen/android/app/build/outputs/apk/universal/debug/" \
            "mobile/src-tauri/gen/android/app/build/outputs/apk/" \
            "mobile/src-tauri/gen/android/app/build/outputs/bundle/release/" \
            "mobile/src-tauri/gen/android/app/build/outputs/" \
            "mobile/src-tauri/gen/android/"; do
            if [ -d "$dir" ]; then
              echo "Checking directory: $dir"
              find "$dir" -name "*.apk" -type f 2>/dev/null | while read apk; do
                echo "  Found: $apk"
              done
            else
              echo "Directory not found: $dir"
            fi
          done
          # 全局搜索所有 APK
          find mobile -name "*.apk" -type f 2>/dev/null > /tmp/apk_files.txt
          echo "=== All APK files found ==="
          cat /tmp/apk_files.txt
          COUNT=$(wc -l < /tmp/apk_files.txt | tr -d ' ')
          echo "Found $COUNT APK file(s)"
          if [ "$COUNT" -gt 0 ]; then
            echo "has_apk=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::No APK file found anywhere in mobile/!"
            echo "has_apk=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifacts
        if: steps.find-apk.outputs.has_apk == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-Android-APK
          path: |
            mobile/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            mobile/src-tauri/target/*/release/bundle/apk/*.apk
            mobile/src-tauri/target/*/debug/bundle/apk/*.apk
          if-no-files-found: warn

      - name: Upload APK to Release
        if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'push') && steps.find-apk.outputs.has_apk == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: /tmp/apk_files.txt
          append_body: true
          body: |
            ### Android
            - Download the `.apk` file and install on your Android device
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
